# Server settings for the FastAPI UI.
# Override any field; missing fields fall back to the defaults in spacesim/config.py.
#
# Launch with: python3 -m spacesim.ui_web
# (uvicorn spacesim.ui_web.server:app still works for the default port.)
server:
  host: 127.0.0.1   # use 0.0.0.0 to expose on a LAN
  port: 8000
  reload: false     # auto-reload on code change (dev only)
