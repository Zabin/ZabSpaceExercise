vignette:
  id: training-basics
  title: "Training: Basics"
  classification: UNCLASSIFIED-TRAINING
  learning_objectives:
    - "Learn the core loop: monitor SOH, task a sensor, plan a command, execute at the window."
    - "See both sides: Blue delivers imagery; Red denies it with reversible effects."
    - "Understand that orders execute at access windows, and cyber is the off-pass exception."
  doctrinal_basis: [orbital_warfare, electromagnetic_warfare, cyber]
  red_doctrine_profile: generic
  estimated_duration_min: 30
  start_epoch_utc: "2030-03-15T06:00:00Z"

  blue_forces:
    - id: ISR-EO-1
      kind: satellite
      orbit: {a_m: 6928137.0, e: 0.0, i_deg: 51.6, raan_deg: 33, argp_deg: 0, ta_deg: 0.0}
      resources: {delta_v_ms: 80.0}
      cyber_posture: low
      cyber_vulnerabilities: [{vector: ground_modem, patchable: true, patched: false}]
      payload_state: {type: isr_eo, collect_rate_per_s: 0.002}
      bus_state: {power: {battery_soc: 0.9, charge_rate_per_s: 0.0002, drain_rate_per_s: 0.0003}}
    # GS-TRN = Kourou (CSG/CNES, French Guiana) — realistic equatorial training downlink site.
    - id: GS-TRN
      kind: ground_station
      location: {lat_deg: 5.24, lon_deg: -52.77, alt_m: 0.0}
      elevation_mask_deg: 5.0

  red_forces:
    - id: RED-TGT
      kind: satellite
      orbit: {a_m: 6938137.0, e: 0.0, i_deg: 51.6, raan_deg: 33, argp_deg: 0, ta_deg: 10.0}
    # JAM-TRN ≈ co-located mobile threat ~25 km from Kourou (same horizon, same pass footprint).
    - id: JAM-TRN
      kind: jammer
      location: {lat_deg: 5.05, lon_deg: -52.65, alt_m: 0.0}
      elevation_mask_deg: 0.0
    - id: RED-CYBER
      kind: cyber_unit
    # Training OPFOR — notional South-American exercise area (not a real DA-ASAT site; the
    # training scenario abstracts the kinetic threat for instructional purposes).
    - id: RED-ASAT
      kind: interceptor
      location: {lat_deg: 0.0, lon_deg: -67.23, alt_m: 0.0}
      elevation_mask_deg: 10.0
      resources: {ammo: 1}

  sensors:
    # RADAR-TRN = forward Caribbean SDA radar (notional Antigua/Curaçao siting near Kourou pass).
    - {id: RADAR-TRN, owner: blue, kind: ground_radar, location: {lat_deg: 12.10, lon_deg: -68.93}}
    # RED-RDR = training OPFOR SDA (notional, paired with the OPFOR ASAT FOB).
    - {id: RED-RDR, owner: red, kind: ground_radar, location: {lat_deg: 0.0, lon_deg: -67.23}}

  objectives:
    blue:
      - {id: deliver_isr, desc: "Deliver imagery before the window", metric: {kind: deliver_before}}
      - {id: keep_custody, desc: "Hold custody of RED-TGT", metric: {kind: custody, side: blue, object: RED-TGT, min_conf: 0.5}}
    red:
      - {id: deny_isr, desc: "Deny Blue's imagery delivery", metric: {kind: deny_delivery}}
      - {id: disable_isr, desc: "Disable the ISR satellite (safe mode)", metric: {kind: asset_safed, target: ISR-EO-1}}

  parameters:
    - {id: red_kinetic_authorized, label: "Red Kinetic ASAT Authorized", type: bool, default: false}
    - {id: cyber_authorized, label: "Cyber Authorized", type: bool, default: true}
    - {id: safe_mode_susceptibility, label: "Safe-Mode Susceptibility", type: enum, options: [robust, realistic, fragile], default: fragile}
    - {id: red_doctrine_profile, label: "Red Doctrine", type: enum, options: [china_integrated, russia_ew_first, generic], default: generic}
    - {id: fog_of_war, label: "Fog of War", type: enum, options: [full_god_view, realistic_sda, heavy_fog], default: realistic_sda}
    - {id: ops_fidelity, label: "Ops Fidelity", type: enum, options: [tactical, realistic, full_ttc], default: realistic}
    - {id: landing_window_start_s, label: "Delivery Window (s)", type: int, default: 3600}

  injects: []

  # Guided walkthrough — the manual and its screenshots are generated from these steps.
  tutorial:
    blue:
      - {n: 1, title: "Review fleet & objectives", when: "at start", action: review,
         expect: "ISR-EO-1 nominal; deliver_isr pending"}
      - {n: 2, title: "Task the sensor to build custody", when: "RADAR-TRN sees RED-TGT (early pass)",
         action: observe, actor: RADAR-TRN, target: RED-TGT, params: {intent: characterize, classification: hostile},
         expect: "characterized track on RED-TGT; keep_custody MET"}
      - {n: 3, title: "Plan the imagery downlink", when: "queues to the next GS-TRN pass",
         action: downlink, actor: ISR-EO-1, params: {via: GS-TRN},
         expect: "queued via ground_uplink with a scheduled window"}
      - {n: 4, title: "Advance to the downlink window", when: "+10 min (past the window)",
         action: advance, params: {to: order_window},
         expect: "imagery delivered; deliver_isr MET"}
      - {n: 5, title: "Maneuver to preserve the orbit", when: "at the next GS-TRN command pass",
         action: maneuver, actor: ISR-EO-1, params: {dv: [0.0, 5.0, 0.0], via: GS-TRN},
         expect: "queued; Δv decremented on execution"}
      - {n: 6, title: "Confirm the objective", when: "after execution",
         action: review, expect: "deliver_isr MET and custody held"}
    red:
      - {n: 1, title: "Review own assets", when: "at start", action: review,
         expect: "jammer, cyber unit, radar, interceptor"}
      - {n: 2, title: "Find the Blue ISR satellite", when: "RED-RDR sees ISR-EO-1 (early pass)",
         action: observe, actor: RED-RDR, target: ISR-EO-1, params: {intent: track},
         expect: "custody on ISR-EO-1"}
      - {n: 3, title: "Jam the downlink", when: "during the GS-TRN pass",
         action: jam, actor: JAM-TRN, target: ISR-EO-1, params: {modulation: barrage, power_w: 200.0},
         expect: "link denied during the footprint window"}
      - {n: 4, title: "Cyber the modem (off-pass)", when: "any time — cyber isn't window-gated",
         action: cyber, actor: RED-CYBER, target: ISR-EO-1,
         params: {vector: ground_modem, payload: seize_c2},
         expect: "ISR-EO-1 enters safe mode; disable_isr MET"}
      - {n: 5, title: "Advance and assess", when: "+10 min, past the delivery window",
         action: advance, params: {dt_s: 3601},
         expect: "Blue payload down; deny_isr MET"}
      - {n: 6, title: "Attempt a kinetic strike (ROE check)", when: "any pass",
         action: engage, actor: RED-ASAT, target: ISR-EO-1, params: {},
         expect: "REJECTED — kinetic ASAT not authorized in this vignette"}

  intro_brief:
    blue:
      situation: "Training environment. A single ISR satellite and ground station have been provisioned to teach the core operator loop: monitor SOH, task a sensor, plan a command at the next window, advance time, observe execution."
      mission: "Deliver imagery once (deliver_isr) and keep custody on the Red target (keep_custody) before T+1 h."
      friendly_forces: "ISR-EO-1 (LEO imager). GS-TRN (training ground station). RADAR-TRN (training radar sensor)."
      threat_picture: "RED-TGT (target), JAM-TRN (jammer), RED-CYBER (cyber), RED-ASAT (kinetic — gated OFF)."
      deadline_note: "T+1 h (3600 s)."
      roe_note: "Red kinetic OFF. Cyber OFF for both sides by default."
      success_criteria: "Both deliver_isr AND keep_custody met by T+1 h."
      tool_tips: "Use this vignette to learn the UI before the canonical 8 numbered scenarios or any of the expansion-track vignettes. Tutorial panel (View ▾) has a step-by-step. The minimum viable Blue play: observe RED-TGT with RADAR-TRN → downlink via GS-TRN → advance time."
    red:
      situation: "Training: practice the reversible-effects toolkit (jam, cyber) against a Blue trainee. Kinetic is OFF so you cannot solve via ASAT."
      mission: "Deny Blue's imagery (deny_isr) and ideally drop the bird to safe mode (disable_isr) before T+1 h."
      friendly_forces: "JAM-TRN (jammer), RED-CYBER (cyber), RED-TGT (target), RED-ASAT (kinetic OFF)."
      threat_picture: "Blue has ISR-EO-1 + GS-TRN. Jam GS-TRN during Blue's downlink pass to deny delivery."
      deadline_note: "T+1 h."
      roe_note: "Kinetic OFF. Cyber gated by cyber_authorized parameter."
      success_criteria: "deny_isr (no delivery) and/or disable_isr (BLUE-SAT safed)."
      tool_tips: "Two paths: (1) jam · JAM-TRN → ISR-EO-1 during the Blue downlink pass; (2) cyber · RED-CYBER → ISR-EO-1 to safe-mode the bird (cyber must be authorized)."
