vignette:
  id: mt-weather-collect
  title: "Mission Trial: Weather Collection"
  classification: UNCLASSIFIED-TRAINING
  learning_objectives:
    - "Routine weather collection is a cadence problem: SoC, eclipse, storage, and downlink timing."
    - "Weather satellites are rarely directly targeted, but bus health still gates the mission."
    - "Storage fills if downlinks are missed; the bus gates the payload (cannot_collect when full)."
  doctrinal_basis: [orbital_warfare]
  red_doctrine_profile: generic
  estimated_duration_min: 30
  start_epoch_utc: "2030-06-01T00:00:00Z"
  geography:
    theater: "Mid-latitude continental coverage; hurricane season"
  blue_forces:
    - id: WX-1
      kind: satellite
      orbit: {a_m: 7178137.0, e: 0.0, i_deg: 98.7, raan_deg: 0, argp_deg: 0, ta_deg: 0.0}
      resources: {delta_v_ms: 30.0}
      payload_state: {type: weather, collect_rate_per_s: 0.003}
      bus_state: {power: {battery_soc: 0.80, charge_rate_per_s: 0.00012, drain_rate_per_s: 0.0001}}
    # GS-WX-PRIMARY = Wallops Flight Facility / NOAA NSOF (Suitland) — US weather downlink.
    - id: GS-WX-PRIMARY
      kind: ground_station
      location: {lat_deg: 37.94, lon_deg: -75.46, alt_m: 0.0}
      elevation_mask_deg: 5.0
    # GS-WX-BACKUP = Fairbanks (NEN polar) — real polar downlink for sun-sync passes.
    - id: GS-WX-BACKUP
      kind: ground_station
      location: {lat_deg: 64.86, lon_deg: -147.85, alt_m: 0.0}
      elevation_mask_deg: 5.0
  red_forces:
    - id: RED-SDA-PASSIVE                          # red doctrine = generic, so this just builds tracks
      kind: satellite
      orbit: {a_m: 7000000.0, e: 0.0, i_deg: 90.0, raan_deg: 50, argp_deg: 0, ta_deg: 0.0}
  sensors:
    # BLUE-WX-RADAR = Cape Cod SFS (PAVE PAWS UEWR) — supports weather-asset custody on US east coast.
    - {id: BLUE-WX-RADAR, owner: blue, kind: ground_radar, location: {lat_deg: 41.75, lon_deg: -70.54}}
  objectives:
    blue:
      - {id: deliver_wx, desc: "Deliver at least one weather product per orbit cycle",
         metric: {kind: deliver_before, flag: imagery_delivered, by_s: 3600}}
      - {id: wx_op, desc: "WX-1 operational at end of window",
         metric: {kind: asset_operational, target: WX-1, by_s: 3600}}
    red:
      - {id: track_blue, desc: "Build custody on WX-1 (passive surveillance)",
         metric: {kind: custody, side: red, object: WX-1, min_conf: 0.5}}
  parameters:
    - {id: red_doctrine_profile, label: "Red Doctrine", type: enum, options: [china_integrated, russia_ew_first, generic], default: generic}
    - {id: fog_of_war, label: "Fog of War", type: enum, options: [full_god_view, realistic_sda, heavy_fog], default: realistic_sda}
    - {id: landing_window_start_s, label: "Window (s)", type: int, default: 3600}
  injects:
    - id: hurricane_advisory
      label: "Hurricane forming; surge collection requested"
      trigger: {type: time, at_sim_s: 900}
      effects:
        - {type: message, to: [blue, white], text: "Tropical cyclone in formation; joint commander requests surge collection cadence over the basin."}
  intro_brief:
    blue:
      situation: "Mid-latitude continental coverage, hurricane season. Routine weather collection is a CADENCE problem — SoC budget, eclipse passes, on-board storage, and downlink-window timing all interact."
      mission: "Deliver weather product (deliver_wx) and keep WX-1 operational (wx_op) through T+30 min."
      friendly_forces: "WX-1 (LEO weather imager), GS-WX-PRIMARY and GS-WX-BACKUP (two ground stations), BLUE-WX-RADAR."
      threat_picture: "RED-SDA-PASSIVE (passive tracker — no action expected)."
      deadline_note: "T+30 min (1800 s)."
      roe_note: "Doctrinal: peacetime weather op. No kinetic."
      success_criteria: "Delivered product + operational bird at deadline."
      tool_tips: "Watch SoC: if too low entering eclipse, collection fails. Downlink at PRIMARY first; BACKUP is the fallback."
    red:
      situation: "Passive watch — observe Blue's cadence."
      mission: "track_blue: maintain track on Blue assets."
      friendly_forces: "RED-SDA-PASSIVE."
      threat_picture: "Blue WX-1 + 2 ground stations + radar."
      deadline_note: "T+30 min."
      roe_note: "Passive. No interaction."
      success_criteria: "Track held."
      tool_tips: "No active play — advance the clock; the tracker stays nominal."
