vignette:
  id: satcom-cyber-link
  title: "SATCOM Cyber & Link"
  classification: UNCLASSIFIED-TRAINING
  learning_objectives:
    - "Cyber acts on the ground/link segment and is not gated by orbital passes."
    - "A single modem exploit can deny service strategically until the vulnerability is patched."
  doctrinal_basis: [cyber, electromagnetic_warfare]
  red_doctrine_profile: china_integrated
  start_epoch_utc: "2030-03-15T06:00:00Z"
  blue_forces:
    - id: BLUE-SATCOM
      kind: satellite
      orbit: {a_m: 42164000.0, e: 0.0, i_deg: 0.05, raan_deg: 0, argp_deg: 0, ta_deg: 0.0}
      cyber_posture: low
      cyber_vulnerabilities: [{vector: ground_modem, patchable: true, patched: false}]
      bus_state: {power: {battery_soc: 0.95}}
      payload_state: {type: satcom}
  red_forces:
    - id: RED-CYBER
      kind: cyber_unit
  sensors:
    # BLUE-RADAR = Cape Cod SFS (PAVE PAWS UEWR), MA — strategic SDA radar.
    - {id: BLUE-RADAR, owner: blue, kind: ground_radar, location: {lat_deg: 41.75, lon_deg: -70.54}}
  objectives:
    blue:
      - {id: keep_service, desc: "Keep SATCOM service up", metric: {kind: asset_operational, target: BLUE-SATCOM, by_s: 3600}}
    red:
      - {id: disable_satcom, desc: "Disable SATCOM via the modem exploit", metric: {kind: asset_safed, target: BLUE-SATCOM}}
  parameters:
    - {id: cyber_authorized, label: "Cyber Authorized", type: bool, default: true}
    - {id: safe_mode_susceptibility, label: "Safe-Mode Susceptibility", type: enum, options: [robust, realistic, fragile], default: fragile}
    - {id: safe_mode_root_cause_persists, label: "Root Cause Persists", type: bool, default: true}
    - {id: red_doctrine_profile, label: "Red Doctrine", type: enum, options: [china_integrated, russia_ew_first, generic], default: china_integrated}
    - {id: fog_of_war, label: "Fog of War", type: enum, options: [full_god_view, realistic_sda, heavy_fog], default: realistic_sda}
    - {id: landing_window_start_s, label: "Campaign Window (s)", type: int, default: 3600}
  injects:
    - id: patch_modem
      label: "Blue patches the ground modem vulnerability"
      trigger: {type: manual}
      effects:
        - {type: patch_cyber_vuln, target: BLUE-SATCOM, vector: ground_modem}
        - {type: message, to: [blue, white], text: "Modem vulnerability patched; re-safing should stop."}
  tutorial:
    blue:
      - {n: 1, title: "Review the SATCOM bird", when: "at start", action: review,
         expect: "BLUE-SATCOM in GEO with an unpatched ground_modem vuln; keep_service for 1 h pending"}
      - {n: 2, title: "Watch for the exploit", when: "BLUE-RADAR monitors health",
         action: observe, actor: BLUE-RADAR, target: BLUE-SATCOM, params: {intent: track},
         expect: "a track to spot the safe-mode drop if Red cybers the modem"}
      - {n: 3, title: "Remove the root cause", when: "White-Cell fires the patch_modem inject",
         action: review,
         expect: "no organic command station here — the modem patch comes via the White-Cell patch_modem inject; recovery only sticks once patched"}
      - {n: 4, title: "Hold service to the deadline", when: "+ advance to +1 h",
         action: advance, params: {dt_s: 3601},
         expect: "if SATCOM is operational at the deadline, keep_service MET"}
    red:
      - {n: 1, title: "Review the cyber unit", when: "at start", action: review,
         expect: "RED-CYBER; disable_satcom (asset_safed) pending — cyber is NOT window-gated"}
      - {n: 2, title: "Exploit the modem off-pass", when: "any time — no pass required",
         action: cyber, actor: RED-CYBER, target: BLUE-SATCOM, params: {access_vector: ground_modem, outcome: safe_mode, success_prob: 1.0, sm_susceptibility: 1.0},
         expect: "BLUE-SATCOM drops to safe mode; disable_satcom MET"}
      - {n: 3, title: "Persist until patched", when: "+ advance through the window",
         action: advance, params: {dt_s: 3601},
         expect: "with root-cause-persists on, the bird re-safes after any recovery until Blue patches the vector"}

  intro_brief:
    blue:
      situation: "GEO comms theatre, March 2030. Threat reporting indicates a Red cyber unit has discovered an unpatched ground-modem vulnerability on our BLUE-SATCOM bird. Exploitation could come at any time — cyber is NOT pass-gated."
      mission: "Keep BLUE-SATCOM operational (out of safe mode) for the +1 h watch window. Root-cause recovery requires PATCHING the vector, not just resetting the bird — a reset alone leaves the vulnerability open."
      friendly_forces: "BLUE-SATCOM (GEO communications, exposed cyber_vulnerabilities: [ground_modem unpatched])."
      threat_picture: "RED-CYBER (cyber unit, ground_modem access vector). Cyber resolves off-pass against your defensive posture and the vulnerability state — there's no access window to interdict."
      deadline_note: "T+1 h (3600 s). The objective measures asset_operational at the deadline."
      roe_note: "No kinetic option. Cyber-vs-cyber is the doctrinal frame."
      success_criteria: "keep_service MET: BLUE-SATCOM not in safe mode at T+1 h."
      tool_tips: "This vignette has NO Blue ground station for direct uplink — the recovery loop requires the White-Cell patch_modem inject. Watch for BLUE-SATCOM dropping to safe mode in the Alarms panel, then ask White to fire patch_modem. After patch, re-issue any required restoration commands."
    red:
      situation: "GEO comms theatre, March 2030. Mission tasking: cyber-disable a Blue GEO SATCOM bird (BLUE-SATCOM) by exploiting an unpatched ground-modem vulnerability. Cyber is not pass-gated — fire when ready."
      mission: "Drop BLUE-SATCOM into safe mode (asset_safed) via the ground_modem vector and keep it there until T+1 h. If Blue resets but doesn't patch the vector, re-exploit."
      friendly_forces: "RED-CYBER (cyber unit, no ground station required)."
      threat_picture: "BLUE-SATCOM (GEO SATCOM, cyber_vulnerabilities ground_modem). Blue lacks an organic patch path — they need a White-Cell patch_modem inject."
      deadline_note: "Keep BLUE-SATCOM in safe mode at T+1 h."
      roe_note: "Cyber ROE is enabled by default (cyber_authorized=true). No window required, no kinetic involved."
      success_criteria: "disable_satcom MET: BLUE-SATCOM in safe mode at T+1 h."
      tool_tips: "Action: cyber · actor: RED-CYBER · target: BLUE-SATCOM · params: {access_vector: ground_modem, outcome: safe_mode, success_prob: 1.0, sm_susceptibility: 1.0}. Fires immediately. Advance through the hour; re-cyber if Blue restores the bird without patching the vector."

