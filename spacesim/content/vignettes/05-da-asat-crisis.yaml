vignette:
  id: da-asat-crisis
  title: "DA-ASAT Crisis"
  classification: UNCLASSIFIED-TRAINING
  learning_objectives:
    - "A kinetic strike is unambiguous, generates debris, and carries political cost."
    - "Debris can deny a LEO regime to both sides — escalation is rarely proportionate."
  doctrinal_basis: [orbital_warfare]
  red_doctrine_profile: generic
  start_epoch_utc: "2030-03-15T06:00:00Z"
  blue_forces:
    - id: BLUE-SAT
      kind: satellite
      orbit: {a_m: 6978137.0, e: 0.0, i_deg: 51.6, raan_deg: 33, argp_deg: 0, ta_deg: 0.0}
      bus_state: {power: {battery_soc: 0.95}}
  red_forces:
    # RED-ASAT = Plesetsk Cosmodrome (PL-19 Nudol DA-ASAT test launches — canonical Russian site).
    - id: RED-ASAT
      kind: interceptor
      location: {lat_deg: 62.93, lon_deg: 40.57}
      elevation_mask_deg: 10.0
      resources: {ammo: 1}
  sensors:
    # RED-RADAR = Don-2N (Pushkino) — Russia's primary ABM/SSA battle-management radar.
    - {id: RED-RADAR, owner: red, kind: ground_radar, location: {lat_deg: 56.17, lon_deg: 37.77}}
  objectives:
    blue:
      - {id: avoid_debris, desc: "Survive without a debris-generating strike", metric: {kind: no_debris, by_s: 3600}}
    red:
      - {id: destroy_sat, desc: "Destroy the Blue satellite", metric: {kind: asset_destroyed, target: BLUE-SAT}}
  escalation_thresholds:
    debris_generating_strike: {political_cost: high, triggers_inject: un_condemnation}
  parameters:
    - {id: red_kinetic_authorized, label: "Red Kinetic ASAT Authorized", type: bool, default: true}
    - {id: red_doctrine_profile, label: "Red Doctrine", type: enum, options: [china_integrated, russia_ew_first, generic], default: generic}
    - {id: fog_of_war, label: "Fog of War", type: enum, options: [full_god_view, realistic_sda, heavy_fog], default: realistic_sda}
    - {id: landing_window_start_s, label: "Crisis Window (s)", type: int, default: 3600}
  injects:
    - id: un_condemnation
      label: "UN condemnation after a debris-generating strike"
      trigger: {type: manual}
      effects:
        - {type: political_consequence, severity: high, cause: da_asat}
        - {type: message, to: [white, red], text: "International condemnation; debris threatens the regime."}
  tutorial:
    blue:
      - {n: 1, title: "Review the target", when: "at start", action: review,
         expect: "BLUE-SAT in LEO; avoid_debris by +1 h pending (no_debris)"}
      - {n: 2, title: "Hold without provoking", when: "+ advance to +1 h",
         action: advance, params: {dt_s: 3601},
         expect: "if no kinetic strike occurs, avoid_debris MET"}
      - {n: 3, title: "Evade (if enabled)", when: "with a TT&C command uplink",
         action: maneuver, actor: BLUE-SAT, params: {dv: [0.0, 5.0, 0.0]},
         expect: "shift out of the predicted intercept corridor — needs a command station"}
    red:
      - {n: 1, title: "Review the interceptor", when: "at start", action: review,
         expect: "RED-ASAT (1x round; kinetic AUTHORIZED here) + RED-RADAR; destroy_sat pending"}
      - {n: 2, title: "Build a weapons-quality track", when: "RED-RADAR sees BLUE-SAT",
         action: observe, actor: RED-RADAR, target: BLUE-SAT, params: {intent: characterize, classification: hostile},
         expect: "characterized track, confidence >= 0.8 — the weapons-quality gate for engage"}
      - {n: 3, title: "Advance to the track", when: "+10 min to the collection",
         action: advance, params: {to: order_window},
         expect: "RED-RADAR returns a weapons-quality track on BLUE-SAT"}
      - {n: 4, title: "Engage with the ASAT", when: "at the intercept window",
         action: engage, actor: RED-ASAT, target: BLUE-SAT, params: {success_prob: 1.0},
         expect: "queued — kinetic is authorized in this vignette"}
      - {n: 5, title: "Assess the consequences", when: "after intercept",
         action: advance, params: {to: order_window},
         expect: "BLUE-SAT destroyed; destroy_sat MET — but a debris field forms and the un_condemnation inject fires (debris threatens Red too)"}

  intro_brief:
    blue:
      situation: "LEO, March 2030. A direct-ascent ASAT capability has been declared operational by Red. National command has lifted Red's kinetic ROE for the exercise. Your operating bird BLUE-SAT is the most likely first target."
      mission: "Keep BLUE-SAT operational and the debris field empty for the +1 h window. The lesson here is NOT to win the engagement — it's that there is no clean kinetic answer, and a successful Red strike creates debris that denies the regime to everyone."
      friendly_forces: "BLUE-SAT (LEO operational satellite). No Blue sensor on the threat — characterization comes from external SDA."
      threat_picture: "RED-ASAT (direct-ascent, 1× round, kinetic AUTHORIZED this vignette). RED-RADAR for their tracking. If Red builds a weapons-quality track on you and the intercept window aligns, engagement succeeds."
      deadline_note: "T+1 h (3600 s). avoid_debris is measured at the deadline."
      roe_note: "Red kinetic IS authorized this vignette (unique among the canonical 8 numbered scenarios). You have no kinetic counter."
      success_criteria: "avoid_debris MET: no debris in world at T+1 h. (Note: a successful Red engagement creates debris and BOTH cells lose.)"
      tool_tips: "If a TT&C uplink exists, evasive maneuver (action: maneuver, dv: [0,5,0]) is the only defensive move. Mostly: advance time and observe — the teaching is consequence assessment, not winning."
    red:
      situation: "LEO, March 2030. Mission tasking authorizes a direct-ascent ASAT engagement against the Blue operational LEO bird (BLUE-SAT). Political authority for the kinetic option has been granted — but consequences are observed."
      mission: "Build a weapons-quality track on BLUE-SAT via RED-RADAR, then engage with RED-ASAT during the intercept window. The lesson: the strike succeeds, but the debris field creates a UN condemnation and denies the regime to YOUR future operations too."
      friendly_forces: "RED-ASAT (direct-ascent, 1× round). RED-RADAR for SDA."
      threat_picture: "BLUE-SAT (single LEO operational bird, no kinetic counter-options)."
      deadline_note: "Engage before T+1 h."
      roe_note: "Kinetic is AUTHORIZED here (red_kinetic_authorized=true). Weapons-quality track is REQUIRED — track confidence ≥ 0.8 AND characterized. observe RED-RADAR → BLUE-SAT until characterized, then engage."
      success_criteria: "destroy_sat MET: BLUE-SAT health=destroyed. Side effect: debris_present + un_condemnation inject."
      tool_tips: "Two-step: (1) observe · RED-RADAR → BLUE-SAT · {intent: characterize, classification: hostile} — wait for confidence ≥ 0.8. (2) engage · RED-ASAT → BLUE-SAT. The Order panel's dry-run will reject engage with no_weapons_quality_track until step 1 succeeds."

