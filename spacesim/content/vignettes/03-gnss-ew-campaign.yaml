vignette:
  id: gnss-ew-campaign
  title: "GNSS EW Campaign"
  classification: UNCLASSIFIED-TRAINING
  learning_objectives:
    - "PNT denial is local and reversible — jamming the user bubble, not killing the satellite."
    - "MEO is effectively safe from kinetic ASAT; the fight is electromagnetic."
  doctrinal_basis: [electromagnetic_warfare]
  red_doctrine_profile: russia_ew_first
  start_epoch_utc: "2030-03-15T06:00:00Z"
  blue_forces:
    - id: BLUE-GNSS
      kind: satellite
      orbit: {a_m: 26560000.0, e: 0.0, i_deg: 55.0, raan_deg: 0, argp_deg: 0, ta_deg: 0.0}
      bus_state: {power: {battery_soc: 0.95}}
  red_forces:
    # RED-JAM = Kaliningrad / Baltiysk — Tirada-2 / Pole-21 reference site (Russian GNSS-jam workhorse).
    - id: RED-JAM
      kind: jammer
      location: {lat_deg: 54.71, lon_deg: 20.51}
      elevation_mask_deg: 0.0
  sensors:
    # BLUE-RADAR = Cavalier SFS (PARCS), ND — dedicated SSN phased-array, GNSS coverage.
    - {id: BLUE-RADAR, owner: blue, kind: ground_radar, location: {lat_deg: 48.72, lon_deg: -97.90}}
  objectives:
    blue:
      - {id: maintain_service, desc: "Keep PNT service operational", metric: {kind: asset_operational, target: BLUE-GNSS, by_s: 3600}}
    red:
      - {id: deny_pnt, desc: "Deny PNT in the user bubble", metric: {kind: link_denied, target: BLUE-GNSS}}
  parameters:
    - {id: red_ew_intensity, label: "Red EW Intensity", type: enum, options: [none, harassment, sustained, total], default: sustained}
    - {id: red_doctrine_profile, label: "Red Doctrine", type: enum, options: [china_integrated, russia_ew_first, generic], default: russia_ew_first}
    - {id: fog_of_war, label: "Fog of War", type: enum, options: [full_god_view, realistic_sda, heavy_fog], default: realistic_sda}
    - {id: landing_window_start_s, label: "Campaign Window (s)", type: int, default: 3600}
  injects: []
  tutorial:
    blue:
      - {n: 1, title: "Review the constellation member", when: "at start", action: review,
         expect: "BLUE-GNSS in MEO; maintain_service for 1 h pending (PNT stays up)"}
      - {n: 2, title: "Monitor the link health", when: "BLUE-RADAR tracks the bird",
         action: observe, actor: BLUE-RADAR, target: BLUE-GNSS, params: {intent: track},
         expect: "a health track so you can read the jamming signature"}
      - {n: 3, title: "Hold service to the deadline", when: "+ advance to +1 h",
         action: advance, params: {dt_s: 3601},
         expect: "if the link is up at the deadline, maintain_service MET"}
      - {n: 4, title: "Understand the limits", when: "throughout", action: review,
         expect: "MEO is effectively safe from kinetic — the fight is electromagnetic and local to the user bubble"}
    red:
      - {n: 1, title: "Review the jammer", when: "at start", action: review,
         expect: "RED-JAM (GNSS downlink jammer); deny_pnt pending (link_denied)"}
      - {n: 2, title: "Jam the PNT link", when: "issue now — RED-JAM covers the user bubble",
         action: jam, actor: RED-JAM, target: BLUE-GNSS, params: {success_prob: 1.0, outcome: deny},
         expect: "BLUE-GNSS link denied in the bubble; deny_pnt MET"}
      - {n: 3, title: "Sustain the denial", when: "+ advance through the campaign window",
         action: advance, params: {dt_s: 3601},
         expect: "PNT stays denied locally and reversibly — no satellite is destroyed"}

  intro_brief:
    blue:
      situation: "Eastern Europe theater, March 2030. Russian doctrine prioritizes electromagnetic warfare as the first move. A regional GNSS-denial campaign is anticipated against forward forces relying on space-based PNT."
      mission: "Maintain operational service from BLUE-GNSS for the +1 h campaign window. PNT denial here is LOCAL to a ground bubble around the jammer — the satellite itself is not damaged. The lesson: MEO is effectively kinetically safe; the fight is electromagnetic and local."
      friendly_forces: "BLUE-GNSS (single MEO PNT bird). BLUE-RADAR (Eglin) for health tracking."
      threat_picture: "RED-JAM (Kaliningrad area ground EW). Footprint covers a regional user bubble — affects ground PNT receivers, not the satellite bus."
      deadline_note: "T+1 h (3600 s). The objective measures asset_operational at the deadline."
      roe_note: "No kinetic option needed. BLUE-GNSS stays nominal unless its bus is attacked (it isn't here)."
      success_criteria: "maintain_service MET: BLUE-GNSS not in safe-mode or destroyed at T+1 h."
      tool_tips: "Mostly passive: monitor BLUE-GNSS SOH and advance time. The teaching point is that the satellite remains healthy — Red's denial is LOCAL to ground users, not satellite-wide. The 2D map shows the GNSS sub-satellite path; the Order panel won't have useful Blue actions here."
    red:
      situation: "Eastern Europe theater, March 2030. Russian EW-first doctrine. Your unit's task is to deny Blue PNT service to forward-deployed forces in a regional ground bubble for the +1 h campaign window."
      mission: "Jam the BLUE-GNSS downlink within the bubble for the full +1 h window. This is reversible-by-design — when you stop transmitting, service is restored. MEO is too high for kinetic options anyway."
      friendly_forces: "RED-JAM (Kaliningrad GNSS-band ground jammer)."
      threat_picture: "BLUE-GNSS (single MEO PNT bird). BLUE-RADAR (Eglin) can track the satellite but cannot stop your jam."
      deadline_note: "Sustain denial through T+1 h."
      roe_note: "No kinetic this vignette. MEO is doctrinally safe from direct ascent. Reversible electronic denial is the only available effect."
      success_criteria: "deny_pnt MET: link_denied on BLUE-GNSS throughout the window."
      tool_tips: "Action: jam · actor: RED-JAM · target: BLUE-GNSS · params: {outcome: deny, success_prob: 1.0}. Then advance through the hour. The Activity Gantt (bottom) shows the jam slot."

