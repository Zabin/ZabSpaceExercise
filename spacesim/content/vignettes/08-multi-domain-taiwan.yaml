vignette:
  id: multi-domain-taiwan
  title: "Multi-Domain Capstone"
  classification: UNCLASSIFIED-TRAINING
  learning_objectives:
    - "Integrate every subsystem: ISR, SATCOM, PNT, RPO, EW, cyber, and SDA in one campaign."
    - "Space enables joint fires; denying it across domains is a synchronized Red effort."
  doctrinal_basis: [orbital_warfare, electromagnetic_warfare, directed_energy, cyber, sda]
  red_doctrine_profile: china_integrated
  estimated_duration_min: 120
  start_epoch_utc: "2030-03-15T06:00:00Z"
  blue_forces:
    # ISR-EO-1: raan chosen so the early ascending pass crosses Diego Garcia.
    - id: ISR-EO-1
      kind: satellite
      orbit: {a_m: 6978137.0, e: 0.0, i_deg: 97.8, raan_deg: 342, argp_deg: 0, ta_deg: 0.0}
      resources: {delta_v_ms: 80.0}
      payload_state: {type: isr_eo, collect_rate_per_s: 0.002}
      bus_state: {power: {battery_soc: 0.9, charge_rate_per_s: 0.0002, drain_rate_per_s: 0.0003}}
    # SATCOM-1 at GEO sub-point ≈ +150° E (Western Pacific) — Taiwan theater + visible from Maui AMOS.
    - id: SATCOM-1
      kind: satellite
      orbit: {a_m: 42164000.0, e: 0.0, i_deg: 0.05, raan_deg: 60, argp_deg: 0, ta_deg: 30.0}
      cyber_posture: low
      cyber_vulnerabilities: [{vector: ground_modem, patchable: true, patched: false}]
      payload_state: {type: satcom}
      bus_state: {power: {battery_soc: 0.95}}
    - id: GNSS-1
      kind: satellite
      orbit: {a_m: 26560000.0, e: 0.0, i_deg: 55.0, raan_deg: 0, argp_deg: 0, ta_deg: 0.0}
      bus_state: {power: {battery_soc: 0.95}}
    # GS-NORTH = Al Dhafra AFB, UAE — Middle East theater Blue downlink.
    - id: GS-NORTH
      kind: ground_station
      location: {lat_deg: 24.25, lon_deg: 54.55}
    # GS-EAST = Andersen AFB AFSCN GTS, Guam — Western Pacific Blue downlink.
    - id: GS-EAST
      kind: ground_station
      location: {lat_deg: 13.62, lon_deg: 144.86}
  red_forces:
    # RED-SURF = Woody Island (Yongxing, Paracels) — PLA militarized base in the South China Sea.
    - id: RED-SURF
      kind: terrestrial_force
      location: {lat_deg: 16.83, lon_deg: 112.34}
    # JAM-NORTH = Bandar Abbas, Iran — Iranian Navy HQ (axis-aligned in capstone; ~430 km from Al Dhafra).
    - id: JAM-NORTH
      kind: jammer
      location: {lat_deg: 27.13, lon_deg: 56.21}
      elevation_mask_deg: 0.0
    - id: RED-CYBER
      kind: cyber_unit
    - id: RED-INSP
      kind: satellite
      orbit: {a_m: 42164000.0, e: 0.0, i_deg: 0.05, raan_deg: 60, argp_deg: 0, ta_deg: 30.6}
      resources: {delta_v_ms: 200.0}
    # RED-ASAT = Jiuquan SLC (SC-19 / DN-series DA-ASAT test history).
    - id: RED-ASAT
      kind: interceptor
      location: {lat_deg: 40.96, lon_deg: 100.29}
      elevation_mask_deg: 10.0
      resources: {ammo: 1}
  sensors:
    # BLUE-RADAR = Eglin AFB AN/FPS-85 — dedicated SSN phased-array, supports Indo-Pacific custody.
    - {id: BLUE-RADAR, owner: blue, kind: ground_radar, location: {lat_deg: 30.57, lon_deg: -86.21}}
    # BLUE-OPT = GEODSS Maui (AMOS, Haleakalā) — Pacific GEO optical SDA, sees the SATCOM-1 sub-point.
    - {id: BLUE-OPT, owner: blue, kind: ground_optical, location: {lat_deg: 20.71, lon_deg: -156.26}, needs_lighting: true}
  objectives:
    blue:
      - {id: deliver_isr, desc: "Deliver imagery before the landing window", metric: {kind: deliver_before}}
      - {id: keep_satcom, desc: "Keep SATCOM operational", metric: {kind: asset_operational, target: SATCOM-1, by_s: 5400}}
      - {id: custody_inspector, desc: "Maintain custody of the GEO inspector", metric: {kind: custody, side: blue, object: RED-INSP, min_conf: 0.5}}
    red:
      - {id: deny_isr, desc: "Deny Blue imagery delivery", metric: {kind: deny_delivery}}
      - {id: disable_satcom, desc: "Disable SATCOM via the modem exploit", metric: {kind: asset_safed, target: SATCOM-1}}
      - {id: shadow_hva, desc: "Shadow the SATCOM bird within 100 km", metric: {kind: proximity, a: RED-INSP, b: SATCOM-1, max_km: 100}}
  escalation_thresholds:
    debris_generating_strike: {political_cost: high, triggers_inject: un_condemnation}
  parameters:
    - {id: red_kinetic_authorized, label: "Red Kinetic ASAT Authorized", type: bool, default: false}
    - {id: cyber_authorized, label: "Cyber Authorized", type: bool, default: true}
    - {id: safe_mode_susceptibility, label: "Safe-Mode Susceptibility", type: enum, options: [robust, realistic, fragile], default: fragile}
    - {id: red_doctrine_profile, label: "Red Doctrine", type: enum, options: [china_integrated, russia_ew_first, generic], default: china_integrated}
    - {id: fog_of_war, label: "Fog of War", type: enum, options: [full_god_view, realistic_sda, heavy_fog], default: realistic_sda}
    - {id: ops_fidelity, label: "Ops Fidelity", type: enum, options: [tactical, realistic, full_ttc], default: realistic}
    - {id: landing_window_start_s, label: "Landing Window (s)", type: int, default: 5400}
    - {id: ssn_blue_dispersion, label: "Blue SSN dispersion", type: enum,
       options: [off, sparse, regional, global, proliferated], default: proliferated}
    - {id: ssn_red_dispersion,  label: "Red SSN dispersion",  type: enum,
       options: [off, sparse, regional, global, proliferated], default: regional}
  injects:
    - id: commercial_imagery_leak
      label: "Commercial SAR imagery reveals the surface group"
      trigger: {type: time, at_sim_s: 2700}
      effects:
        - {type: reveal_asset, target: RED-SURF, to: blue}
        - {type: message, to: [blue, white], text: "OSINT leak: commercial SAR shows the surface group."}
    - id: patch_modem
      label: "Blue patches the SATCOM modem vulnerability"
      trigger: {type: manual}
      effects:
        - {type: patch_cyber_vuln, target: SATCOM-1, vector: ground_modem}
        - {type: message, to: [blue, white], text: "SATCOM modem patched."}
  tutorial:
    blue:
      - {n: 1, title: "Triage three missions", when: "at start", action: review,
         expect: "deliver_isr + keep_satcom + custody_inspector all pending — you can't do everything at once"}
      - {n: 2, title: "Queue the imagery downlink", when: "ISR-EO-1 over GS-NORTH",
         action: downlink, actor: ISR-EO-1, params: {via: GS-NORTH},
         expect: "queued via ground_uplink — beat the +90 min window (JAM-NORTH will try to deny it)"}
      - {n: 3, title: "Hold custody of the GEO inspector", when: "BLUE-OPT lit pass on RED-INSP",
         action: observe, actor: BLUE-OPT, target: RED-INSP, params: {intent: characterize, classification: hostile},
         expect: "characterized track; re-task before the 30-min half-life to keep custody_inspector"}
      - {n: 4, title: "Protect SATCOM", when: "BLUE-RADAR watches SATCOM-1",
         action: observe, actor: BLUE-RADAR, target: SATCOM-1, params: {intent: track},
         expect: "watch for RED-CYBER safing the modem; the patch comes via the White-Cell patch_modem inject"}
      - {n: 5, title: "Advance and assess", when: "+ advance to +90 min",
         action: advance, params: {to: order_window},
         expect: "deliver_isr MET if the downlink beat the jam; keep_satcom / custody_inspector held if defended"}
    red:
      - {n: 1, title: "Synchronize the denial", when: "at start", action: review,
         expect: "jam ISR + cyber SATCOM + shadow the GEO bird — coordinate across domains"}
      - {n: 2, title: "Jam the imagery downlink", when: "during Blue's GS-NORTH pass",
         action: jam, actor: JAM-NORTH, target: ISR-EO-1, params: {success_prob: 1.0, outcome: deny},
         expect: "denies the downlink window; deny_isr if Blue can't re-route to GS-EAST"}
      - {n: 3, title: "Cyber the SATCOM modem", when: "any time — off-pass",
         action: cyber, actor: RED-CYBER, target: SATCOM-1, params: {access_vector: ground_modem, outcome: safe_mode, success_prob: 1.0, sm_susceptibility: 1.0},
         expect: "SATCOM-1 drops to safe mode; disable_satcom MET until Blue patches"}
      - {n: 4, title: "Shadow the GEO inspector", when: "Red-doctrine / White-Cell closing burns",
         action: maneuver, actor: RED-INSP, params: {dv: [0.0, 2.0, 0.0]},
         expect: "close within 100 km of SATCOM-1 for shadow_hva — needs a Red command-uplink path"}
      - {n: 5, title: "Hold and assess", when: "+ advance to +90 min",
         action: advance, params: {dt_s: 5401},
         expect: "deny_isr + disable_satcom MET if sustained; kinetic ASAT stays OFF unless White-Cell authorizes"}
