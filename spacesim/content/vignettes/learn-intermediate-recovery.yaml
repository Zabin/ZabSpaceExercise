vignette:
  id: learn-intermediate-recovery
  title: "Learning: Safe-Mode Recovery"
  classification: UNCLASSIFIED-TRAINING
  learning_objectives:
    - "Recognize safe-mode entry from telemetry signatures (CPU load + FSW errors → cyber cause)."
    - "Walk the recovery script in order: establish contact → diagnose → patch root cause → re-enable."
    - "If the root cause persists (unpatched vulnerability), the bus will re-safe — patch first."
  doctrinal_basis: [cyber]
  red_doctrine_profile: china_integrated
  estimated_duration_min: 45
  start_epoch_utc: "2030-03-22T10:00:00Z"
  geography:
    theater: "Single ISR satellite + ground site; controlled training environment"
  blue_forces:
    - id: ISR-EO-LEARN
      kind: satellite
      orbit: {a_m: 6928137.0, e: 0.0, i_deg: 51.6, raan_deg: 33, argp_deg: 0, ta_deg: 0.0}
      resources: {delta_v_ms: 60.0}
      cyber_posture: low
      cyber_vulnerabilities: [{vector: ground_modem, patchable: true, patched: false}]
      payload_state: {type: isr_eo, collect_rate_per_s: 0.002}
      bus_state: {power: {battery_soc: 0.85, charge_rate_per_s: 0.0002, drain_rate_per_s: 0.0003}}
    - id: GS-LEARN
      kind: ground_station
      location: {lat_deg: 14.74, lon_deg: -56.54, alt_m: 0.0}
      elevation_mask_deg: 5.0
  red_forces:
    - id: RED-CYBER
      kind: cyber_unit
  sensors:
    - {id: BLUE-RADAR-LEARN, owner: blue, kind: ground_radar, location: {lat_deg: 14.74, lon_deg: -56.54}}
  objectives:
    blue:
      - {id: recover_to_nominal, desc: "Recover ISR-EO-LEARN to nominal mode and keep it there",
         metric: {kind: asset_operational, target: ISR-EO-LEARN, by_s: 2700}}
    red:
      - {id: keep_safed, desc: "Keep ISR-EO-LEARN in safe mode at end of window",
         metric: {kind: asset_safed, target: ISR-EO-LEARN}}
  parameters:
    - {id: cyber_authorized, label: "Cyber Authorized", type: bool, default: true}
    - {id: safe_mode_susceptibility, label: "Safe-Mode Susceptibility", type: enum, options: [robust, realistic, fragile], default: fragile}
    - {id: safe_mode_root_cause_persists, label: "Root Cause Persists", type: bool, default: true}
    - {id: red_doctrine_profile, label: "Red Doctrine", type: enum, options: [china_integrated, russia_ew_first, generic], default: china_integrated}
    - {id: fog_of_war, label: "Fog of War", type: enum, options: [full_god_view, realistic_sda, heavy_fog], default: realistic_sda}
    - {id: landing_window_start_s, label: "Window (s)", type: int, default: 2700}
  injects:
    - id: cyber_trigger
      label: "Red fires the modem exploit (manual trigger)"
      trigger: {type: manual}
      effects:
        - {type: message, to: [blue, red, white], text: "Red cyber unit fires the ground_modem exploit. Expect FSW errors, then safe mode."}
    - id: patch_modem
      label: "Blue patches the ground modem (recovery step)"
      trigger: {type: manual}
      effects:
        - {type: patch_cyber_vuln, target: ISR-EO-LEARN, vector: ground_modem}
        - {type: message, to: [blue, white], text: "Modem vulnerability patched. Re-safing should stop; complete the recovery chain."}
  tutorial:
    blue:
      - {n: 1, title: "Read SOH", action: "Open the bus card; note the green status. Watch FSW error counter."}
      - {n: 2, title: "Notice the attack", action: "Watch CPU load and FSW error climb (cyber signature). Asset will safe."}
      - {n: 3, title: "Establish contact", action: "Wait for the next ground pass; observe pass-gated telemetry update."}
      - {n: 4, title: "Diagnose", action: "Confirm safe-mode cause via telemetry signatures; identify the modem vector."}
      - {n: 5, title: "Patch root cause", action: "Issue def.patch_cyber with vector=ground_modem. Verify the vulnerability shows patched."}
      - {n: 6, title: "Re-enable", action: "Issue cdh.clear_fault and adcs.set_mode=nominal. Confirm the bus returns to green."}
    red:
      - {n: 1, title: "Build the picture", action: "Task a sensor on the Blue ISR to confirm its orbit."}
      - {n: 2, title: "Fire the exploit", action: "Use the manual inject to fire the modem exploit; watch Blue's bus safe."}
      - {n: 3, title: "Re-fire when ready", action: "If Blue does not patch the vulnerability, fire again — the bus will re-safe."}
      - {n: 4, title: "Concede when patched", action: "Once Blue patches the modem, the exploit no longer works; the round is over."}
      - {n: 5, title: "After action", action: "Review the AAR to see how many safe-mode entries you achieved."}
