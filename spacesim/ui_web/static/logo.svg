<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32" role="img" aria-label="Space Control simulator logo">
  <!-- Stylized Earth + orbital trajectory + satellite. Color uses currentColor so it tints with the
       active cell accent on the page (FUTURE-WORK user-added #8). -->
  <defs>
    <radialGradient id="earthGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a44" />
      <stop offset="100%" stop-color="#0a1424" />
    </radialGradient>
  </defs>
  <!-- Earth disk -->
  <circle cx="32" cy="36" r="18" fill="url(#earthGrad)" stroke="currentColor" stroke-width="1.2" opacity="0.95" />
  <!-- Continents (abstract) -->
  <path d="M22 32 q4 -5 9 -3 q3 4 -1 7 q-5 3 -8 -4 z" fill="currentColor" opacity="0.35" />
  <path d="M38 41 q3 -4 7 -1 q1 4 -3 5 q-5 1 -4 -4 z" fill="currentColor" opacity="0.30" />
  <!-- Orbital ellipse around Earth -->
  <ellipse cx="32" cy="36" rx="28" ry="11" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.7"
           transform="rotate(-20 32 36)" />
  <!-- Satellite (triangle marker) at the top-right of the orbit -->
  <g transform="translate(54 22) rotate(20)">
    <polygon points="0,-4 -4,3 4,3" fill="currentColor" />
  </g>
  <!-- Crosshair tick at the bottom of the orbit (ground-station / receive point) -->
  <rect x="12" y="49" width="3" height="3" fill="currentColor" opacity="0.8" />
</svg>
